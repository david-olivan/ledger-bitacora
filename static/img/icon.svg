<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="The Workbench">
  <title>The Workbench</title>
  <defs>
    <linearGradient id="wb-brass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#D4C35A"/>
      <stop offset="0.5" stop-color="#B5A642"/>
      <stop offset="1" stop-color="#8B7D1E"/>
    </linearGradient>
    <radialGradient id="wb-face" cx="0.4" cy="0.34" r="0.85">
      <stop offset="0" stop-color="#FBF7EE"/>
      <stop offset="1" stop-color="#EDE8D8"/>
    </radialGradient>
  </defs>

  <!-- bezel -->
  <circle cx="32" cy="32" r="29" fill="url(#wb-brass)" stroke="#6F6315" stroke-width="1.5"/>
  <!-- screws -->
  <g fill="#8B7D1E">
    <circle cx="32" cy="6.5" r="1.6"/>
    <circle cx="32" cy="57.5" r="1.6"/>
    <circle cx="6.5" cy="32" r="1.6"/>
    <circle cx="57.5" cy="32" r="1.6"/>
  </g>
  <!-- dial face -->
  <circle cx="32" cy="32" r="23" fill="url(#wb-face)" stroke="#8B7D1E" stroke-width="1"/>

  <!-- ticks across a 240° sweep -->
  <g stroke="#2A1F14" stroke-width="1.4" stroke-linecap="round">
    <g transform="rotate(-120 32 32)"><line x1="32" y1="11.5" x2="32" y2="16.5"/></g>
    <g transform="rotate(-90 32 32)"><line x1="32" y1="11.5" x2="32" y2="16.5"/></g>
    <g transform="rotate(-60 32 32)"><line x1="32" y1="11.5" x2="32" y2="16.5"/></g>
    <g transform="rotate(-30 32 32)"><line x1="32" y1="11.5" x2="32" y2="16.5"/></g>
    <g transform="rotate(0 32 32)"><line x1="32" y1="11.5" x2="32" y2="16.5"/></g>
    <g transform="rotate(30 32 32)"><line x1="32" y1="11.5" x2="32" y2="16.5"/></g>
    <g transform="rotate(60 32 32)"><line x1="32" y1="11.5" x2="32" y2="16.5"/></g>
    <g transform="rotate(90 32 32)"><line x1="32" y1="11.5" x2="32" y2="16.5"/></g>
    <g transform="rotate(120 32 32)"><line x1="32" y1="11.5" x2="32" y2="16.5"/></g>
  </g>

  <!-- needle -->
  <line x1="32" y1="32" x2="45.5" y2="20.5" stroke="#8B5A1E" stroke-width="2.6" stroke-linecap="round"/>
  <!-- hub -->
  <circle cx="32" cy="32" r="3.6" fill="url(#wb-brass)" stroke="#6F6315" stroke-width="1"/>
</svg>
