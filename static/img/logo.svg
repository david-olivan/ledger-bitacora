      <g transform="rotate(-90 32 32)"><line x1="32" y1="11.5" x2="32" y2="16.5"/></g>
      <g transform="rotate(-60 32 32)"><line x1="32" y1="11.5" x2="32" y2="16.5"/></g>
      <g transform="rotate(-30 32 32)"><line x1="32" y1="11.5" x2="32" y2="16.5"/></g>
      <g transform="rotate(0 32 32)"><line x1="32" y1="11.5" x2="32" y2="16.5"/></g>
      <g transform="rotate(30 32 32)"><line x1="32" y1="11.5" x2="32" y2="16.5"/></g>
      <g transform="rotate(60 32 32)"><line x1="32" y1="11.5" x2="32" y2="16.5"/></g>
      <g transform="rotate(90 32 32)"><line x1="32" y1="11.5" x2="32" y2="16.5"/></g>
