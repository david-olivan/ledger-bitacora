{% load i18n %}
<div class="task-card {% if task.completed %}task-card--completed{% endif %}" id="task-{{ task.pk }}">
    <div class="task-card__header">
        <button class="task-card__complete-btn"
                hx-post="{% url 'workbench:task_complete' task.pk %}"
                hx-target="#bucket-{{ task.bucket_id }}"
                hx-swap="outerHTML"
                title="{% if task.completed %}{% trans 'Mark incomplete' %}{% else %}{% trans 'Mark complete' %}{% endif %}">
            {% if task.completed %}✓{% else %}○{% endif %}
        </button>
        <span class="task-card__title">{{ task.title }}</span>
    </div>

    {% if task.task_tags.all %}
    <div class="task-card__tags">
        {% for tt in task.task_tags.all %}
        <span class="tag-chip tag-chip--{{ tt.tag.color }}">{{ tt.tag.name }}</span>
        {% endfor %}
    </div>
    {% endif %}

    {% if task.end_date %}
    <div class="task-card__date">{{ task.end_date|date:"d/m/Y" }}</div>
    {% endif %}

    <button class="task-card__edit-btn"
            hx-get="{% url 'workbench:task_detail' task.pk %}"
            hx-target="#task-editor-panel"
            hx-swap="innerHTML">
        {% trans "Edit" %} →
    </button>
</div>
