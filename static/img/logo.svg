<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 88" role="img" aria-label="Ledger Bitácora">
  <title>Ledger Bitácora</title>
  <defs>
    <linearGradient id="lbl-brass" x1="0" y1="0" x2="1" y2="1">
