{% load i18n %}
<li class="checklist-item {% if item.checked %}checklist-item--checked{% endif %}" id="checklist-item-{{ item.pk }}">
    <button hx-post="{% url 'workbench:checklist_item_toggle' item.pk %}"
            hx-target="#checklist-item-{{ item.pk }}"
            hx-swap="outerHTML"
            class="checklist-item__toggle"
            type="button">
        {% if item.checked %}✓{% endif %}
    </button>
    <span class="checklist-item__text">{{ item.text }}</span>
    <button hx-delete="{% url 'workbench:checklist_item_delete' item.pk %}"
            hx-target="#checklist-item-{{ item.pk }}"
            hx-swap="delete"
            class="checklist-item__delete"
            type="button">✕</button>
</li>
